services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: activity-logger-backend
    ports:
      - "8000:8000"
    volumes:
      - activity-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/activity_logger.db
      - ALLOWED_ORIGINS=["http://localhost:3000","http://frontend:3000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: activity-logger-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  activity-data:
    driver: local
